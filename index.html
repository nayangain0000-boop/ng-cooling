<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.G COOLING SOLUTION</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f6fc; color: #333; text-align: center; }
        header { background-color: #0056b3; color: white; padding: 35px 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 2.3em; letter-spacing: 1px; }
        header p { margin: 5px 0 0 0; font-size: 1.1em; opacity: 0.9; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        .booking-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-top: 20px; text-align: left; }
        .booking-card h2 { color: #0056b3; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; font-size: 1.4em; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #555; }
        input[type="text"], input[type="tel"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; box-sizing: border-box; font-family: Arial, sans-serif; }
        textarea { resize: vertical; height: 80px; }
        
        .price-box { background-color: #e8f5e9; border: 1px dashed #28a745; border-radius: 6px; padding: 15px; margin-top: 15px; text-align: center; }
        .price-title { font-size: 1em; color: #555; margin: 0; }
        .price-amount { font-size: 1.8em; font-weight: bold; color: #28a745; margin: 5px 0 0 0; }

        .btn-submit { display: block; width: 100%; background-color: #25d366; color: white; padding: 15px; margin-top: 20px; font-size: 1.2em; text-decoration: none; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .btn-call { display: inline-block; background-color: #0056b3; color: white; padding: 12px 25px; margin-top: 25px; font-size: 1.1em; text-decoration: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        footer { margin-top: 30px; padding: 20px; font-size: 0.85em; color: #777; }
    </style>
</head>
<body>

    <header>
        <h1>N.G COOLING SOLUTION</h1>
        <p>Your Trusted Partner for Home Appliance Repair & Service</p>
    </header>

    <div class="container">
        <div class="booking-card">
            <h2>Select Service & Book Online</h2>
            
            <!-- Customer Name -->
            <div class="form-group">
                <label for="custName">Your Name / আপনার নাম:</label>
                <input type="text" id="custName" placeholder="Enter your name" required>
            </div>
            
            <!-- Customer Phone -->
            <div class="form-group">
                <label for="custPhone">Phone Number / মোবাইল নম্বর:</label>
                <input type="tel" id="custPhone" placeholder="Enter mobile number" required>
            </div>

            <!-- Customer Address -->
            <div class="form-group">
                <label for="custAddress">Full Address / আপনার ঠিকানা:</label>
                <textarea id="custAddress" placeholder="Enter your full address" required></textarea>
            </div>

            <!-- Customer Pin Code -->
            <div class="form-group">
                <label for="custPin">Pin Code / পিন কোড:</label>
                <input type="text" id="custPin" placeholder="Enter 6-digit pin code" required>
            </div>

            <!-- Service Selection -->
            <div class="form-group">
                <label for="serviceSelect">Select Service / সার্ভিস বেছে নিন:</label>
                <select id="serviceSelect" onchange="updatePrice()">
                    <option value="jetpump" data-price="499" data-original="599">Jet Pump Deep Cleaning Foam Service</option>
                    <option value="ac_repair" data-price="199">AC Repair Service</option>
                    <option value="microwave" data-price="199">Microwave Repair</option>
                    <option value="washing_machine" data-price="199">Washing Machine Repair</option>
                    <option value="fridge" data-price="199">Fridge Repair</option>
                    <option value="geyser" data-price="199">Geyser Repair</option>
                </select>
            </div>

            <!-- Price Display -->
            <div class="price-box">
                <p class="price-title">Service Charge / সার্ভিস চার্জ:</p>
                <p class="price-amount" id="displayPrice">₹499 <span style="font-size:0.5em; font-weight:normal; color:#d32f2f; text-decoration:line-through; margin-left:10px;">₹599</span></p>
            </div>

            <button class="btn-submit" onclick="sendNotification()">✅ Confirm Booking via WhatsApp</button>
        </div>

        <a href="tel:7439160014" class="btn-call">📞 Direct Call: 7439160014</a>
    </div>

    <footer>
        <p>© 2026 N.G COOLING SOLUTION. All rights reserved.</p>
    </footer>

    <script>
        function updatePrice() {
            var select = document.getElementById("serviceSelect");
            var selectedOption = select.options[select.selectedIndex];
            var price = selectedOption.getAttribute("data-price");
            var originalPrice = selectedOption.getAttribute("data-original");
            
            var priceHTML = "₹" + price;
            if (originalPrice) {
                priceHTML += ' <span style="font-size:0.5em; font-weight:normal; color:#d32f2f; text-decoration:line-through; margin-left:10px;">₹' + originalPrice + '</span>';
            }
            document.getElementById("displayPrice").innerHTML = priceHTML;
        }

        function sendNotification() {
            var name = document.getElementById("custName").value.trim();
            var phone = document.getElementById("custPhone").value.trim();
            var address = document.getElementById("custAddress").value.trim();
            var pin = document.getElementById("custPin").value.trim();
            var select = document.getElementById("serviceSelect");
            var selectedServiceText = select.options[select.selectedIndex].text;
            
            if (name === "" || phone === "" || address === "" || pin === "") {
                alert("Please fill in all fields / দয়া করে সব কটি ঘর পূরণ করুন।");
                return;
            }
            
            var myPhoneNumber = "917439160014"; 
            
            // নতুন মেসেজ ফরম্যাট যেখানে ঠিকানা ও পিন কোড থাকবে
            var message = "New Booking Request from Website!\n\n" +
                          "👤 Name: " + name + "\n" +
                          "📱 Phone: " + phone + "\n" +
                          "📍 Address: " + address + "\n" +
                          "📌 Pin Code: " + pin + "\n" +
                          "🛠️ Service: " + selectedServiceText;
            
            var encodedMessage = encodeURIComponent(message);
            window.open("https://api.whatsapp.com/send?phone=" + myPhoneNumber + "&text=" + encodedMessage, '_blank');
        }
    </script>

</body>
</html>
